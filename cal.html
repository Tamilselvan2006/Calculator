<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculator</title>
<style>
  :root{
    --bg:#0f1724;
    --card:#0b1220;
    --muted:#93a4b8;
    --accent:#7c5cff;
    --accent-2:#32d2b6;
    --glass: rgba(255,255,255,0.04);
    --glass-2: rgba(255,255,255,0.02);
    --danger:#ff6b6b;
    --radius:14px;
    --gap:12px;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(800px 400px at 10% 10%, rgba(124,92,255,0.12), transparent 8%),
      radial-gradient(700px 300px at 90% 90%, rgba(50,210,182,0.08), transparent 12%),
      var(--bg);
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    padding:28px;
  }

  .calculator {
    width: 360px;
    max-width: calc(100vw - 40px);
    background: linear-gradient(180deg,var(--card), #07101a 120%);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow:
      0 10px 30px rgba(2,6,23,0.6),
      inset 0 1px 0 rgba(255,255,255,0.02);
    display:grid;
    grid-template-rows: auto 1fr;
    gap:12px;
    border: 1px solid rgba(255,255,255,0.03);
  }

  /* Header */
  .top-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .brand {
    display:flex;
    gap:10px;
    align-items:center;
  }
  .logo {
    width:40px;height:40px;border-radius:10px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow: 0 6px 18px rgba(124,92,255,0.2);
    display:flex;align-items:center;justify-content:center;font-weight:700;
  }
  .brand .name {font-weight:600; font-size:14px; color:#eaf0ff}
  .brand .meta {font-size:11px;color:var(--muted); margin-top:2px}

  .controls {display:flex; gap:8px; align-items:center}
  .btn-toggle{
    background:var(--glass); border:0; padding:8px; border-radius:10px; cursor:pointer;
    color:var(--muted); font-weight:600;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-toggle:focus{outline:2px solid rgba(124,92,255,0.18)}

  /* Display */
  .display {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;
    padding:14px;
    min-height:84px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:4px;
    border:1px solid rgba(255,255,255,0.02);
  }
  .small {
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    word-break:break-all;
  }
  .main {
    font-size:28px;
    font-weight:700;
    text-align:right;
    line-height:1;
    letter-spacing:0.4px;
    word-break:break-all;
  }

  /* keypad */
  .keys {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    margin-top:8px;
  }

  button.key {
    border:0;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:600;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    color:#e8f0ff;
    box-shadow: 0 6px 16px rgba(2,6,23,0.6);
    cursor:pointer;
    transition: transform .08s ease, box-shadow .08s ease, filter .08s ease;
    user-select:none;
  }
  button.key:active{ transform: translateY(2px) }
  button.key:focus{outline:2px solid rgba(124,92,255,0.14)}

  .key.operator {
    background: linear-gradient(180deg, rgba(124,92,255,0.14), rgba(124,92,255,0.06));
    color:white;
    box-shadow: 0 8px 20px rgba(124,92,255,0.12);
  }
  .key.equal {
    grid-column: span 2;
    background: linear-gradient(90deg,var(--accent),var(--accent-2));
    color:white;
    box-shadow: 0 10px 26px rgba(124,92,255,0.22);
  }
  .key.clear {
    background: linear-gradient(180deg, rgba(255,107,107,0.14), rgba(255,107,107,0.04));
    color:var(--danger);
  }
  .key.wide { grid-column: span 2; }
  .history {
    margin-top:10px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }
  .history-list {
    background:var(--glass-2);
    border-radius:10px;
    padding:8px;
    font-size:13px;
    color:var(--muted);
    max-height:120px;
    overflow:auto;
  }
  .history-item {padding:6px 8px; border-radius:8px; margin-bottom:6px; background: rgba(255,255,255,0.01); display:flex; justify-content:space-between; gap:8px}
  .history-item small {color:var(--muted); opacity:0.9}
  @media (max-width:400px){
    .calculator{ width:320px }
    .main{ font-size:24px }
    button.key{ padding:14px; font-size:16px }
  }
</style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Stylish Calculator">
    <div>
      <div class="top-row">
        <div class="brand" aria-hidden="false">
          <div class="logo">C</div>
          <div>
            <div class="name"></div>
            <div class="meta"></div>
          </div>
        </div>

        <div class="controls">
          <button id="historyToggle" class="btn-toggle" title="Toggle history (H)">History</button>
          <button id="themeToggle" class="btn-toggle" title="Clear (Esc)">AC</button>
        </div>
      </div>

      <section class="display" aria-live="polite">
        <div id="smallDisplay" class="small" aria-hidden="true"></div>
        <div id="mainDisplay" class="main" role="status" aria-label="Calculator display">0</div>
      </section>

      <div class="keys" role="group" aria-label="Calculator keypad">
        <button class="key clear" data-action="clear" title="All clear (Esc)">AC</button>
        <button class="key" data-action="back" title="Backspace (Backspace)">⌫</button>
        <button class="key" data-action="percent" title="Percent (%)">%</button>
        <button class="key operator" data-action="/" title="Divide (/)">÷</button>

        <button class="key" data-action="7">7</button>
        <button class="key" data-action="8">8</button>
        <button class="key" data-action="9">9</button>
        <button class="key operator" data-action="*" title="Multiply (*)">×</button>

        <button class="key" data-action="4">4</button>
        <button class="key" data-action="5">5</button>
        <button class="key" data-action="6">6</button>
        <button class="key operator" data-action="-" title="Subtract (-)">−</button>

        <button class="key" data-action="1">1</button>
        <button class="key" data-action="2">2</button>
        <button class="key" data-action="3">3</button>
        <button class="key operator" data-action="+" title="Add (+)">+</button>

        <button class="key" data-action="+/-" title="Toggle sign (s)">±</button>
        <button class="key" data-action="0">0</button>
        <button class="key" data-action="." title="Decimal (.)">.</button>
        <button class="key equal" data-action="=" title="Equals (Enter)">=</button>
      </div>
    </div>

    <div class="history" aria-hidden="true">
      <div style="flex:1">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <strong style="font-size:13px">History</strong>
          <small style="font-size:12px;color:var(--muted)">Recent</small>
        </div>
        <div id="historyList" class="history-list" aria-live="polite"></div>
      </div>
    </div>
  </main>

<script>
(() => {
  const mainDisplay = document.getElementById('mainDisplay');
  const smallDisplay = document.getElementById('smallDisplay');
  const keys = Array.from(document.querySelectorAll('.key'));
  const historyList = document.getElementById('historyList');
  const historyToggle = document.getElementById('historyToggle');
  const themeToggle = document.getElementById('themeToggle');

  let current = '0';
  let prev = null;
  let operator = null;
  let overwrite = false;
  let history = [];

  function updateDisplays(){
    mainDisplay.textContent = current;
    smallDisplay.textContent = prev !== null && operator ? `${prev} ${operator}` : '';
    renderHistory();
  }

  function inputDigit(d){
    if(overwrite || current === '0' && d !== '.'){
      current = d;
      overwrite = false;
    } else {
      // avoid multiple leading zeros
      if(current === '0' && d === '0') return;
      if(d === '.' && current.includes('.')) return;
      current = (current === '0' && d !== '.') ? d : current + d;
    }
    updateDisplays();
  }

  function handleOperator(op){
    if(op === '+/-'){
      if(current === '0') return;
      current = (current.startsWith('-') ? current.slice(1) : '-' + current);
      updateDisplays();
      return;
    }

    if(op === '%'){
      // percent of current number
      current = (parseFloat(current) / 100).toString();
      overwrite = true;
      updateDisplays();
      return;
    }

    if(prev === null){
      prev = current;
      operator = op;
      overwrite = true;
    } else if(!overwrite){
      // compute previous operation then set new operator
      compute();
      operator = op;
      prev = current;
      overwrite = true;
    } else {
      operator = op; // change operator
    }
    updateDisplays();
  }

  function compute(){
    if(prev === null || operator === null) return;
    const a = parseFloat(prev);
    const b = parseFloat(current);
    let result = 0;
    switch(operator){
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/': result = b === 0 ? NaN : a / b; break;
      default: result = b;
    }
    // handle floating point rounding
    if(!Number.isFinite(result)) result = NaN;
    if(!Number.isNaN(result) && !Number.isInteger(result)){
      result = parseFloat(result.toFixed(12)); // trim floating noise
    }
    // push to history
    addHistory(`${a} ${operator} ${b} = ${result}`);
    current = String(result);
    prev = null;
    operator = null;
    overwrite = true;
    updateDisplays();
  }

  function addHistory(text){
    history.unshift({text, ts: Date.now()});
    if(history.length > 12) history.pop();
    renderHistory();
  }

  function renderHistory(){
    historyList.innerHTML = '';
    if(history.length === 0){
      historyList.innerHTML = '<div style="opacity:.6">No recent calculations</div>';
      return;
    }
    for(const h of history){
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `<div style="font-size:13px">${escapeHtml(h.text)}</div>
                        <small>${new Date(h.ts).toLocaleTimeString()}</small>`;
      historyList.appendChild(item);
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
  }
  function clearAll(){
    current = '0'; prev = null; operator = null; overwrite = false;
    updateDisplays();
  }

  function backspace(){
    if(overwrite || current.length === 1){
      current = '0';
      overwrite = false;
    } else {
      current = current.slice(0, -1);
    }
    updateDisplays();
  }
  keys.forEach(k => {
    k.addEventListener('click', (e) => {
      const action = k.getAttribute('data-action');
      if(!action) return;
      if(/\d/.test(action) || action === '.'){
        inputDigit(action);
      } else if(action === 'clear'){
        clearAll();
      } else if(action === 'back'){
        backspace();
      } else if(action === '='){
        compute();
      } else {
            handleOperator(action);
      }
    });
  });
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if((/[\d.+\-*/%]/.test(key)) || key === 'Enter' || key === 'Backspace' || key === 'Escape' || key.toLowerCase() === 'h' || key.toLowerCase() === 's'){
      e.preventDefault();
    }

    if(/\d/.test(key)) inputDigit(key);
    if(key === '.') inputDigit('.');
    if(key === 'Enter') compute();
    if(key === '=') compute();
    if(key === '+') handleOperator('+');
    if(key === '-') handleOperator('-');
    if(key === '*') handleOperator('*');
    if(key === '/') handleOperator('/');
    if(key === '%') handleOperator('%');
    if(key === 'Backspace') backspace();
    if(key === 'Escape' || key === 'Esc') clearAll();
    if(key.toLowerCase() === 'h') toggleHistory();
    if(key.toLowerCase() === 's') handleOperator('+/-');
  });
  function toggleHistory(){
    const hist = document.querySelector('.history');
    if(hist.style.display === 'none' || getComputedStyle(hist).display === 'none'){
      hist.style.display = 'flex';
      historyToggle.classList.add('active');
    } else {
      hist.style.display = 'none';
      historyToggle.classList.remove('active');
    }
  }

  historyToggle.addEventListener('click', toggleHistory);
  themeToggle.addEventListener('click', clearAll);

  document.querySelector('.history').style.display = 'none';
  updateDisplays();
  window.calc = { clearAll, compute, inputDigit, handleOperator, history };
})();
</script>
</body>
</html>
